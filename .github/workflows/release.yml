name: Release
on:
  push:
    branches: [main]
concurrency: release-${{ github.ref }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - name: Check if release is ready
        id: check
        run: |
          if [ -z "$(ls -A .changeset/ 2>/dev/null | grep -v config.json | grep -v README.md)" ]; then
            echo "no_changesets=true" >> $GITHUB_OUTPUT
          fi
          if [ ! -d "packages/react-nibble" ]; then
            echo "no_facade=true" >> $GITHUB_OUTPUT
          fi
      - name: Create Release Pull Request or Publish
        if: steps.check.outputs.no_changesets != 'true' && steps.check.outputs.no_facade != 'true'
        uses: changesets/action@v1
        with:
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
